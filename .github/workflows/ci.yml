# =============================================================================
# CI Pipeline: Path-based validation for services and infrastructure
# Triggers: Pull requests to main branch OR manual dispatch
# Strategy: Only run jobs for changed components (cost optimization)
# =============================================================================
name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  contents: read
  security-events: write

on:
  pull_request:
    branches: ["main"]
  # Manual trigger: allows running CI on any branch without creating PR
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run all jobs (ignore path filters)"
        required: false
        type: boolean
        default: false

jobs:
  # Detect which parts of monorepo changed
  detect-changes:
    name: Detect Changed Components
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
      iac: ${{ steps.filter.outputs.iac }}
      services-list: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect path changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            services:
              - 'services/**'
            iac:
              - 'infrastructure/ansible/**'
              - 'compose/**'
              - 'config/**'

      - name: Get changed files
        if: steps.filter.outputs.services == 'true'
        id: changed-files
        uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68
        with:
          files: services/**
          dir_names: true
          dir_names_max_depth: 2

      - name: Discover changed services
        id: set-matrix
        if: steps.filter.outputs.services == 'true'
        run: |
          if [ -n "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            # Extract service names: remove 'services/' prefix and filter out 'services' itself
            SERVICES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | \
              sed 's|^services/||' | grep -v '^services$' | sort -u | \
              jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Changed services: $SERVICES"
            echo "services=$SERVICES" >> $GITHUB_OUTPUT
          else
            echo "services=[]" >> $GITHUB_OUTPUT
          fi

  # Validate Infrastructure as Code (Ansible)
  lint-iac:
    name: Lint IaC
    needs: detect-changes
    if: needs.detect-changes.outputs.iac == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate cache key dependencies
        run: |
          echo "ansible==13.0.0" >> temp-deps.txt
          echo "ansible-lint==25.11.1" >> temp-deps.txt

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('temp-deps.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install ansible==13.0.0 ansible-lint==25.11.1

      - name: Run ansible-lint
        run: cd infrastructure/ansible && ansible-lint roles/ --exclude 'roles/*/molecule/'

  # Build and test changed services (parallel execution)
  build-test-services:
    name: Build & Test ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.services == 'true' && needs.detect-changes.outputs.services-list != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services-list) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # Verify Maven wrapper exists
      - name: Check Maven wrapper
        run: |
          if [ ! -f "./mvnw" ]; then
            echo "Error: Maven wrapper (mvnw) not found in repository root"
            echo "Please run: mvn wrapper:wrapper in the root directory"
            exit 1
          fi

      - name: Build and test with Maven wrapper
        run: ./mvnw -f services/${{ matrix.service }}/pom.xml --batch-mode --update-snapshots verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/surefire-reports/

  # Security scan with Trivy (CRITICAL/HIGH vulnerabilities)
  scan-services:
    name: Scan ${{ matrix.service }}
    needs: [detect-changes, build-test-services]
    if: needs.detect-changes.outputs.services == 'true' && needs.detect-changes.outputs.services-list != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services-list) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          image-ref: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4.31.10
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
